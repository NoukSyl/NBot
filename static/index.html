<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Mobile V10.18</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #3fb950; font-family: monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #terminal { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; padding-bottom: 80px; }
        #input-area { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; padding: 12px; display: flex; gap: 8px; border-top: 1px solid #333; }
        input { background: #0d1117; border: 1px solid #444; color: #58a6ff; flex: 1; padding: 12px; border-radius: 25px; font-size: 16px; outline: none; }
        button { background: #238636; border: none; color: #fff; width: 60px; height: 45px; border-radius: 25px; font-weight: bold; }
        .u { color: #fff; align-self: flex-end; background: #21262d; padding: 8px 15px; border-radius: 18px; max-width: 85%; margin-top: 10px; }
        .ai { color: #c9d1d9; align-self: flex-start; line-height: 1.4; white-space: pre-wrap; width: 100%; }
        .s { background: #111; border-left: 3px solid #238636; padding: 10px; font-size: 11px; color: #888; margin: 5px 0; border-radius: 4px; overflow-x: auto; }
    </style>
</head>
<body>
    <div id="terminal"><div>[SYSTEM] Online. Powered by Gemini 3.1 Flash-Lite</div></div>
    <div id="input-area">
        <input type="search" id="cmd" placeholder="Type here..." autocomplete="off" inputmode="text">
        <button id="go">GO</button>
    </div>
    <script>
        const term = document.getElementById('terminal');
        const inp = document.getElementById('cmd');
        const btn = document.getElementById('go');
        let hist = [];

        async function send() {
            const val = inp.value.trim(); if (!val) return;
            inp.value = ''; term.innerHTML += `<div class="u">${val}</div>`;
            term.scrollTop = term.scrollHeight;

            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: val, history: hist })
                });

                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    decoder.decode(value).split('\n').forEach(line => {
                        if (line.startsWith('data: ')) {
                            const d = JSON.parse(line.substring(6));
                            if (d.step) term.innerHTML += `<div class="s"><b>LOG:</b> ${d.step}<br>${d.result}</div>`;
                            else if (d.reply) {
                                term.innerHTML += `<div class="ai">${d.reply}</div>`;
                                hist.push({role:'user', content:val}, {role:'model', content:d.reply});
                                if (hist.length > 6) hist = hist.slice(-6);
                            }
                            term.scrollTop = term.scrollHeight;
                        }
                    });
                }
            } catch(e) {
                term.innerHTML += `<div style="color:red">Error: ${e.message}</div>`;
            }
        }
        btn.onclick = send;
        inp.onkeypress = (e) => { if(e.key === 'Enter') send(); };
    </script>
</body>
</html>
