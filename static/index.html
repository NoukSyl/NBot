<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Agent Terminal V10.10</title>
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: 'Fira Code', monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #terminal { flex: 1; overflow-y: auto; padding: 20px; }
        #input-area { display: flex; padding: 15px; background: #161b22; border-top: 1px solid #30363d; }
        input { background: transparent; border: none; color: #58a6ff; flex: 1; outline: none; font-size: 16px; font-family: inherit; }
        .prompt { color: #58a6ff; font-weight: bold; margin-right: 10px; }
        .ai-msg { color: #8b949e; margin-bottom: 10px; white-space: pre-wrap; }
        .step { background: #1c2128; border-left: 3px solid #3fb950; padding: 8px; margin: 8px 0; font-size: 12px; border-radius: 0 4px 4px 0; }
        .user-msg { color: #ffffff; margin-top: 15px; border-bottom: 1px solid #21262d; padding-bottom: 5px; }
    </style>
</head>
<body>
    <div id="terminal"><div class="ai-msg">[SYSTEM] V10.10 Ready. Autonomous/Minimal-Thinking Mode.</div></div>
    <div id="input-area">
        <span class="prompt">root@agent:~#</span>
        <input type="text" id="input" autofocus autocomplete="off">
    </div>
    <script>
        const term = document.getElementById('terminal');
        const input = document.getElementById('input');
        let hist = [];

        input.addEventListener('keypress', async (e) => {
            if (e.key === 'Enter' && input.value) {
                const val = input.value; input.value = '';
                term.innerHTML += `<div class="user-msg"><b>User:</b> ${val}</div>`;
                input.disabled = true;

                try {
                    const res = await fetch('/chat', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({message: val, history: hist})
                    });
                    const data = await res.json();
                    
                    let html = `<div class="ai-msg">${data.reply}</div>`;
                    if(data.steps) data.steps.forEach(s => {
                        html += `<div class="step"><b>RUN:</b> ${s.tool}<br>${s.result}</div>`;
                    });
                    term.innerHTML += html;
                    hist.push({role:'user', content:val}, {role:'model', content:data.reply});
                    if(hist.length > 6) hist.shift();
                } catch(err) { term.innerHTML += '<div style="color:red">Error!</div>'; }
                
                term.scrollTop = term.scrollHeight;
                input.disabled = false; input.focus();
            }
        });
    </script>
</body>
</html>
