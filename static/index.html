<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Agent Mobile</title>
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #terminal { flex: 1; overflow-y: auto; padding: 15px; font-size: 14px; }
        #input-area { display: flex; padding: 10px; background: #161b22; border-top: 1px solid #30363d; position: sticky; bottom: 0; }
        input { background: #0d1117; border: 1px solid #30363d; color: #58a6ff; flex: 1; outline: none; font-size: 16px; padding: 12px; border-radius: 8px; }
        button { background: #238636; border: none; color: white; padding: 0 20px; margin-left: 8px; border-radius: 8px; font-weight: bold; }
        .ai-msg { color: #8b949e; margin-bottom: 15px; padding: 10px; background: #1c2128; border-radius: 8px; line-height: 1.5; }
        .user-msg { color: #ffffff; margin: 15px 0 5px 0; font-weight: bold; text-align: right; }
        .step { color: #3fb950; background: #000; border: 1px solid #238636; padding: 8px; margin: 5px 0; font-family: monospace; font-size: 12px; overflow-x: auto; }
    </style>
</head>
<body>
    <div id="terminal"><div class="ai-msg">Mobile Terminal Ready.</div></div>
    <form id="input-form" style="margin:0;">
        <div id="input-area">
            <input type="text" id="input" placeholder="Type here..." autofocus>
            <button type="submit">SEND</button>
        </div>
    </form>
    <script>
        const term = document.getElementById('terminal');
        const form = document.getElementById('input-form');
        const input = document.getElementById('input');
        let hist = [];

        form.onsubmit = async (e) => {
            e.preventDefault();
            if (!input.value) return;
            const val = input.value; input.value = '';
            term.innerHTML += `<div class="user-msg">${val}</div>`;
            input.disabled = true;

            const res = await fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: val, history: hist})
            });
            const data = await res.json();
            let html = `<div class="ai-msg">${data.reply}</div>`;
            if(data.steps) data.steps.forEach(s => {
                html += `<div class="step"><b>[RUN]</b> ${s.tool}<br>${s.result}</div>`;
            });
            term.innerHTML += html;
            hist.push({role:'user', content:val}, {role:'model', content:data.reply});
            term.scrollTop = term.scrollHeight;
            input.disabled = false; input.focus();
        };
    </script>
</body>
</html>
