<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Mobile Agent</title>
    <style>
        * { box-sizing: border-box; }
        body { background: #000; color: #3fb950; font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #log { flex: 1; overflow-y: auto; padding: 15px; font-size: 14px; border-bottom: 2px solid #161b22; }
        #input-area { display: flex; padding: 10px; background: #161b22; gap: 8px; }
        input { background: #0d1117; border: 1px solid #30363d; color: #58a6ff; flex: 1; padding: 12px; border-radius: 6px; font-size: 16px; outline: none; }
        button { background: #238636; border: none; color: white; padding: 0 15px; border-radius: 6px; font-weight: bold; }
        .user-line { color: #fff; margin: 15px 0 5px 0; font-weight: bold; }
        .ai-line { color: #8b949e; margin-bottom: 15px; white-space: pre-wrap; line-height: 1.4; }
        .step-box { background: #0d1117; border: 1px solid #238636; padding: 10px; margin: 8px 0; border-radius: 4px; font-size: 12px; color: #aaa; }
        .step-box b { color: #3fb950; }
    </style>
</head>
<body>
    <div id="log"><div>[SYSTEM] Agent V10.13 Ready.</div></div>
    <form id="chat-form">
        <div id="input-area">
            <input type="text" id="userInput" placeholder="Type command..." autocomplete="off">
            <button type="submit">GO</button>
        </div>
    </form>
    <script>
        const log = document.getElementById('log');
        const form = document.getElementById('chat-form');
        const input = document.getElementById('userInput');
        let history = [];

        form.onsubmit = async (e) => {
            e.preventDefault();
            const msg = input.value.trim();
            if (!msg) return;

            input.value = '';
            input.disabled = true;
            log.innerHTML += `<div class="user-line">> ${msg}</div>`;
            log.scrollTop = log.scrollHeight;

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: msg, history: history })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullReply = "";

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    
                    lines.forEach(line => {
                        if (line.startsWith('data: ')) {
                            const data = JSON.parse(line.substring(6));
                            if (data.step) {
                                log.innerHTML += `<div class="step-box"><b>RUN:</b> ${data.step}<br>${data.result}</div>`;
                            } else if (data.reply) {
                                fullReply = data.reply;
                                log.innerHTML += `<div class="ai-line">${data.reply}</div>`;
                                history.push({role: 'user', content: msg});
                                history.push({role: 'model', content: fullReply});
                                if (history.length > 10) history = history.slice(-10);
                            }
                            log.scrollTop = log.scrollHeight;
                        }
                    });
                }
            } catch (err) {
                log.innerHTML += `<div style="color:red">Error: ${err.message}</div>`;
            } finally {
                input.disabled = false;
                input.focus();
            }
        };
    </script>
</body>
</html>
