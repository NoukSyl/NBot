<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Agent Terminal</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #3fb950; font-family: monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #terminal { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; padding-bottom: 80px; }
        #input-container { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; padding: 10px; border-top: 1px solid #30363d; display: flex; gap: 8px; z-index: 1000; }
        input { background: #0d1117; border: 1px solid #30363d; color: #58a6ff; flex: 1; padding: 12px; border-radius: 20px; font-size: 16px; outline: none; }
        button { background: #238636; border: none; color: white; width: 50px; height: 44px; border-radius: 50%; font-weight: bold; }
        .user-msg { color: #fff; align-self: flex-end; background: #21262d; padding: 8px 12px; border-radius: 15px; max-width: 85%; }
        .ai-msg { color: #c9d1d9; align-self: flex-start; line-height: 1.5; white-space: pre-wrap; width: 100%; }
        .step { background: #0d1117; border-left: 3px solid #3fb950; padding: 8px; font-size: 11px; color: #8b949e; margin: 5px 0; overflow-x: auto; }
    </style>
</head>
<body>
    <div id="terminal"><div class="ai-msg">[SYSTEM] Agent V10.15 Ready.</div></div>
    <div id="input-container">
        <input type="search" id="cmd" placeholder="Command..." autocomplete="off" inputmode="text" readonly onfocus="this.removeAttribute('readonly');">
        <button id="sendBtn">GO</button>
    </div>
    <script>
        const terminal = document.getElementById('terminal');
        const cmdInput = document.getElementById('cmd');
        const sendBtn = document.getElementById('sendBtn');
        let history = [];

        async function sendMessage() {
            const msg = cmdInput.value.trim();
            if (!msg) return;
            cmdInput.value = '';
            cmdInput.setAttribute('readonly', 'readonly');
            terminal.innerHTML += `<div class="user-msg">${msg}</div>`;
            terminal.scrollTop = terminal.scrollHeight;
            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: msg, history: history })
                });
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    lines.forEach(line => {
                        if (line.startsWith('data: ')) {
                            const data = JSON.parse(line.substring(6));
                            if (data.step) {
                                terminal.innerHTML += `<div class="step"><b>> ${data.step}</b><br>${data.result}</div>`;
                            } else if (data.reply) {
                                terminal.innerHTML += `<div class="ai-msg">${data.reply}</div>`;
                                history.push({role:'user', content:msg}, {role:'model', content:data.reply});
                            }
                            terminal.scrollTop = terminal.scrollHeight;
                        }
                    });
                }
            } catch (e) { terminal.innerHTML += `<div style="color:red">Error: ${e}</div>`; }
            finally { cmdInput.removeAttribute('readonly'); }
        }
        sendBtn.onclick = sendMessage;
        cmdInput.onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };
    </script>
</body>
</html>
